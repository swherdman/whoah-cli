proxy_cache_path /var/cache/nginx/pkg levels=1:2 keys_zone=pkg:10m max_size=10g inactive=30d use_temp_path=off;

log_format cache '$remote_addr [$time_local] "$request" $status '
                 '$body_bytes_sent $upstream_cache_status';

server {
    listen 80;

    access_log /var/log/nginx/pkg-cache.log cache;

    # Resolve DNS dynamically (Google + Cloudflare public DNS)
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 10s;

    location / {
        # Use variable so nginx re-resolves DNS per resolver settings
        set $upstream https://pkg.oxide.computer;
        proxy_pass $upstream;
        proxy_ssl_server_name on;
        proxy_set_header Host pkg.oxide.computer;

        # Upstream timeouts — generous for large packages over slow connections
        proxy_connect_timeout 120s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        proxy_cache pkg;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 120s;

        # Cache key includes the full URI
        proxy_cache_key "$request_uri";

        # Add header so we can verify cache hits
        add_header X-Cache-Status $upstream_cache_status;
    }
}
