# whoah-cache-config v2
proxy_cache_path /var/cache/nginx/pkg levels=1:2 keys_zone=pkg:10m max_size=10g inactive=30d use_temp_path=off;

log_format cache '$remote_addr [$time_local] "$request" $status '
                 '$body_bytes_sent $upstream_cache_status';

server {
    listen 80;

    access_log /var/log/nginx/pkg-cache.log cache;

    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 10s;

    # Shared proxy settings applied to all locations below
    set $upstream https://pkg.oxide.computer;
    proxy_ssl_server_name on;
    proxy_set_header Host pkg.oxide.computer;
    proxy_connect_timeout 120s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    proxy_cache_key "$request_uri";

    # Content-addressed package files — immutable by SHA, cache aggressively
    location ~ ^/[^/]+/[^/]+/[^/]+/file/ {
        proxy_pass $upstream;
        proxy_cache pkg;
        proxy_cache_valid 200 365d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 120s;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Per-FMRI manifests — stable but not content-addressed, keep for a week
    location ~ ^/[^/]+/[^/]+/[^/]+/manifest/ {
        proxy_pass $upstream;
        proxy_cache pkg;
        proxy_cache_valid 200 7d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 120s;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Mutable catalog/version metadata — short TTL + revalidation so new package
    # versions in the active publisher (v3) are picked up within 10 minutes.
    # Both helios/2/dev/ and helios/3/dev/ are naturally served side-by-side;
    # cache keys include the full path so they don't collide.
    location ~ ^/[^/]+/[^/]+/[^/]+/(catalog|versions|p5i|search)/ {
        proxy_pass $upstream;
        proxy_cache pkg;
        proxy_cache_valid 200 10m;
        proxy_cache_valid 404 30s;
        proxy_cache_revalidate on;
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 30s;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Fallback for anything else (stats, attrs, etc.)
    location / {
        proxy_pass $upstream;
        proxy_cache pkg;
        proxy_cache_valid 200 1h;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 120s;
        add_header X-Cache-Status $upstream_cache_status;
    }
}
