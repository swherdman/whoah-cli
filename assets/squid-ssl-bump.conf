# Squid SSL-bump caching forward proxy
# Intercepts HTTPS connections, caches content transparently

# Listen on port 3128 as a forward proxy with ssl-bump
http_port 3128 ssl-bump \
    cert=/etc/squid/ssl/ca-cert.pem \
    key=/etc/squid/ssl/ca-key.pem \
    generate-host-certificates=on \
    dynamic_cert_mem_cache_size=4MB

# SSL bump: peek at the SNI, then bump (MITM) the connection
acl step1 at_step SslBump1
ssl_bump peek step1
ssl_bump bump all

# TLS settings for outbound connections
sslproxy_cert_error allow all
tls_outgoing_options flags=DONT_VERIFY_PEER

# Cache settings — 10GB disk cache, generous object size
cache_dir ufs /var/spool/squid 10240 16 256
maximum_object_size 512 MB
cache_mem 256 MB

# Cache everything by default
refresh_pattern .               43200  100%  525600  override-expire override-lastmod reload-into-ims ignore-reload ignore-no-cache ignore-no-store ignore-private

# Access control — allow all (internal network only)
acl localnet src all
http_access allow localnet
http_access allow localhost
http_access deny all

# Logging
access_log stdio:/var/log/squid/access.log
cache_log /var/log/squid/cache.log

# DNS
dns_nameservers 8.8.8.8 1.1.1.1

# Visible hostname
visible_hostname whoah-cache

# SSL certificate database
sslcrtd_program /usr/lib/squid/security_file_certgen -s /var/lib/squid/ssl_db -M 4MB
